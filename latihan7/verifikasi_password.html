<!DOCTYPE html>
<html>
<head>
    <title>Verifikasi Password</title>
</head>
<body>

    <h2>Verifikasi Password</h2>

    Masukkan Password: <input type="password" id="pass"><br><br>
    <button onclick="cekPassword()">Login</button>

    <p id="hasil"></p>

    <script>
        function cekPassword() {
            var password = document.getElementById("pass").value;
            var passwordBenar = "12345";

            if (password === passwordBenar) {
                document.getElementById("hasil").innerHTML = "Login berhasil!";
            } else {
                document.getElementById("hasil").innerHTML = "Password salah!";
            }
        }
    </script>

</body>
</html>
