<!DOCTYPE html>
<html>
<head>
    <title>Box Model</title>
    <style>
        body {
            font-family: Arial;
        }

        .box {
            width: 250px;
            height: 120px;
            background-color: lightblue;

            padding: 20px;              /* jarak dalam */
            border: 5px solid black;    /* garis */
            margin: 30px;               /* jarak luar */
        }

        .box2 {
            width: 250px;
            height: 120px;
            background-color: lightgreen;

            padding: 10px;
            border: 3px dashed red;
            margin: 20px;
        }
    </style>
</head>
<body>

<h2>Contoh CSS Box Model</h2>

<div class="box">
    Ini contoh box model 1
</div>

<div class="box2">
    Ini contoh box model 2
</div>

<p>
Kesimpulan: Box model terdiri dari margin, border, dan padding. 
Margin mengatur jarak luar, padding mengatur jarak dalam, dan border adalah garis pembatas elemen.
</p>

</body>
</html>
