<!DOCTYPE html>
<html>
<head>
    <title>Grid Layout</title>
    <style>
        body {
            font-family: Arial;
        }

        .tempat_grid {
            display: grid;
            grid-template-columns: auto auto auto;
            gap: 10px;
            background-color: lightgray;
            padding: 10px;
        }

        .item {
            background-color: orange;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Grid Layout</h2>

<div class="tempat_grid">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
</div>

<br>

<p>Kesimpulan skenario 1: Grid layout digunakan untuk mengatur elemen dalam bentuk baris dan kolom.</p>

</body>
</html>
