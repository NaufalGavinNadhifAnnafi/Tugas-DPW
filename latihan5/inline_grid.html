<!DOCTYPE html>
<html>
<head>
    <title>Inline Grid</title>
    <style>
        .tempat_grid {
            display: inline-grid; /* beda di sini */
            grid-template-columns: auto auto auto;
            gap: 10px;
            background-color: lightgray;
            padding: 10px;
        }

        .item {
            background-color: orange;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<h2>Inline Grid</h2>

<div class="tempat_grid">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
</div>

<p>Kesimpulan: inline-grid membuat grid mengikuti ukuran konten, tidak full lebar seperti grid biasa.</p>

</body>
</html>
